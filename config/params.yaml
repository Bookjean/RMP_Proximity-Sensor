# RB10 RMPflow RViz Parameters

rmpflow_controller:
  ros__parameters:
    control_rate: 50.0
    estimate_velocity_in_controller: false
    controller_velocity_filter_alpha: 0.5
    use_synced_input_velocity_filter: true
    synced_input_velocity_filter_type: "alpha-beta"
    synced_input_velocity_filter_alpha: 0.35
    synced_input_velocity_filter_beta: 0.02
    synced_input_velocity_ratio_tolerance: 0.05
    use_velocity_feedback_in_solver: true
    measured_position_feedback_blend: 0.5
    measured_velocity_feedback_blend: 1.0
    visualization_rate: 20.0
    goal_x: 0.6
    goal_y: -0.4
    goal_z: 0.6
    min_goal_z: 0.05
    initialize_goal_from_first_state: true
    safety_stop_on_min_z: true
    workspace_floor_z: 0.0
    min_link6_z: 0.03
    min_tcp_z: 0.05
    initial_q: [1.0660471071181365, -0.3311238656883642, -1.7919295430225781, 0.8574628082122941, -1.557060585581701, 0.15151203236562774]
    default_q: [1.0660471071181365, -0.3311238656883642, -1.7919295430225781, 0.8574628082122941, -1.557060585581701, 0.15151203236562774]
    joint_limit_buffers: [0.01, 0.01, 0.01, 0.01, 0.01, 0.01]
    backend_mode: "simulation"
    hardware_state_topic: "hardware_joint_states"
    hardware_command_topic: "hardware_joint_command"
    joint_state_topic: "joint_states"
    position_command_topic: "position_controllers/commands"
    publish_joint_states: true
    publish_goal_tf: true
    goal_tf_parent_frame: "base_link"
    goal_tf_child_frame: "rmp_goal_target"
    enable_realtime: false
    realtime_priority: 80
    lock_memory: false
    body_goal: [0.45, 0.0, 0.9]
    orientation_goal: [0.0, 0.0, 1.0]
    solve_method: "rmp2"
    rmp_type: "canonical"
    # RMP graph topology
    graph:
      node_names:
        - cspace_target
        - joint_limits
        - joint_velocity_cap
        - tcp_position
        - target
        - control_points
        - collision
        - damping
        - body_link4
        - tcp_orientation_x
        - tcp_orientation_y
        - tcp_orientation_z
        - tcp_axis_target_x
        - tcp_axis_target_y
        - tcp_axis_target_z
      cspace_target:
        parents: [root]
        parent: root
        task_map: cspace_target
        leaf: cspace_target
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      joint_limits:
        parents: [root]
        parent: root
        task_map: joint_limit
        leaf: joint_limit
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      joint_velocity_cap:
        parents: [root]
        parent: root
        task_map: identity
        leaf: joint_velocity_cap
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tcp_position:
        parents: [root]
        parent: root
        task_map: tcp_position
        leaf: none
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      target:
        parents: [tcp_position]
        parent: tcp_position
        task_map: identity
        leaf: target
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      control_points:
        parents: [root]
        parent: root
        task_map: control_points
        leaf: none
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      collision:
        parents: [control_points]
        parent: control_points
        task_map: collision_distance
        leaf: collision
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      damping:
        parents: [root]
        parent: root
        task_map: identity
        leaf: damping
        enabled: true
        target_key: goal
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      body_link4:
        parents: [root]
        parent: root
        task_map: link_position
        leaf: target
        enabled: false
        target_key: body_goal
        link_name: link4
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tcp_orientation_x:
        parents: [root]
        parent: root
        task_map: link_orientation_axis
        leaf: orientation_target
        enabled: false
        target_key: orientation_goal_x
        link_name: tcp_rmp
        axis: "x"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tcp_orientation_y:
        parents: [root]
        parent: root
        task_map: link_orientation_axis
        leaf: orientation_target
        enabled: false
        target_key: orientation_goal_y
        link_name: tcp_rmp
        axis: "y"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tcp_orientation_z:
        parents: [root]
        parent: root
        task_map: link_orientation_axis
        leaf: orientation_target
        enabled: false
        target_key: orientation_goal_z
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tcp_axis_target_x:
        parents: [root]
        parent: root
        task_map: link_orientation_axis
        leaf: axis_target
        enabled: true
        target_key: orientation_goal_x
        link_name: tcp_rmp
        axis: "x"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tcp_axis_target_y:
        parents: [root]
        parent: root
        task_map: link_orientation_axis
        leaf: axis_target
        enabled: true
        target_key: orientation_goal_y
        link_name: tcp_rmp
        axis: "y"
        handcrafted_leaf: none
        identity_multiplier: 0.0
      tcp_axis_target_z:
        parents: [root]
        parent: root
        task_map: link_orientation_axis
        leaf: axis_target
        enabled: false
        target_key: orientation_goal_z
        link_name: tcp_rmp
        axis: "z"
        handcrafted_leaf: none
        identity_multiplier: 0.0
    # RMP solver common
    root_solve_offset: 0.001

    # Collision RMP
    collision_rmp_margin: 0.0
    collision_rmp_damping_gain: 20.0
    collision_rmp_damping_std_dev: 0.01
    collision_rmp_damping_robustness_eps: 0.01
    collision_rmp_damping_velocity_gate_length_scale: 0.01
    collision_rmp_repulsion_gain: 100.0
    collision_rmp_repulsion_std_dev: 0.05
    collision_rmp_metric_modulation_radius: 5.0
    collision_rmp_metric_scalar: 2500000.0
    collision_rmp_metric_exploder_std_dev: 0.01
    collision_rmp_metric_exploder_eps: 1.0

    # Target RMP
    target_rmp_accel_p_gain: 50.0
    target_rmp_accel_d_gain: 20.0
    target_rmp_accel_norm_eps: 0.08
    target_rmp_metric_alpha_length_scale: 0.01
    target_rmp_min_metric_alpha: 0.1
    target_rmp_max_metric_scalar: 100000.0
    target_rmp_min_metric_scalar: 25000.0
    target_rmp_proximity_metric_boost_scalar: 1.0
    target_rmp_proximity_metric_boost_length_scale: 0.02

    # Axis Target RMP
    axis_target_rmp_accel_p_gain: 50.0
    axis_target_rmp_accel_d_gain: 20.0
    axis_target_rmp_metric_scalar: 5000.0
    axis_target_rmp_proximity_metric_boost_scalar: 10.0
    axis_target_rmp_proximity_metric_boost_length_scale: 0.01

    # Orientation RMP
    orientation_rmp_accel_p_gain: 1000.0
    orientation_rmp_accel_d_gain: 100.0
    orientation_rmp_metric_scalar: 0.0

    # Damping RMP
    damping_rmp_accel_d_gain: 50.0
    damping_rmp_metric_scalar: 0.0
    damping_rmp_inertia: 0.0

    # C-space Target RMP
    cspace_target_metric_scalar: 0.0
    cspace_target_position_gain: 25.0
    cspace_target_damping_gain: 18.0
    cspace_target_robust_position_term_thresh: 0.5
    cspace_target_inertia: 0.0

    # Joint Limit RMP
    joint_limit_metric_scalar: 0.0
    joint_limit_metric_length_scale: 0.01
    joint_limit_metric_exploder_eps: 0.001
    joint_limit_metric_velocity_gate_length_scale: 0.01
    joint_limit_accel_damper_gain: 200.0
    joint_limit_accel_potential_gain: 1.0
    joint_limit_accel_potential_exploder_eps: 0.01
    joint_limit_accel_potential_exploder_length_scale: 0.1

    # Joint Velocity Cap RMP
    joint_velocity_cap_max_velocity: 1.75
    joint_velocity_cap_velocity_damping_region: 0.05
    joint_velocity_cap_damping_gain: 18.0
    joint_velocity_cap_metric_weight: 0.0

    # Command limits
    max_joint_accel: 20.0
    command_guard_max_velocity_rad_s: 2.5

    # Robot body guard obstacles
    body_obstacles:
      names:
        - link1_guard_1
        - link1_guard_2
        - link1_guard_3
        - link2_guard_1
        - link2_guard_2
